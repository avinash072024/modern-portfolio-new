
@if (!isOnline) {

<div class="d-flex flex-column min-vh-100 overflow-hidden">

  <app-header></app-header>

  <main class="flex-grow-1 overflow-hidden">
    @if (isOnline) {
    <router-outlet></router-outlet>
    }
  </main>

  <app-footer></app-footer>

<button class="scroll-top d-flex align-items-center justify-content-center shadow" [class.show]="showScrollTop"
  [attr.aria-hidden]="!showScrollTop" (click)="scrollToTop()" aria-label="Scroll to top">
  <i class="bi bi-arrow-up-short fs-4"></i>
</button>
